name: Docker-publish

on:
  push:
    # Triggers only on semantic version tags
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Mandatory for uploading SARIF results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Single source of truth: the version required in go.mod (currently 1.26.4).
          go-version-file: go.mod

      - name: Set up Bun
        # v2.2.0 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1'

      # The server embeds goeland-front/dist via //go:embed, but dist/ is
      # git-ignored. Build the frontend first so `go test ./...` (which compiles
      # cmd/goeland-server) can resolve the embed pattern. `build` also runs the
      # vue-tsc type-check, the code-quality gate the Dockerfile defers to CI.
      - name: Build embedded frontend
        working-directory: cmd/goeland-server/goeland-front
        run: bun install --frozen-lockfile && bun run build

      - name: Run Unit Tests
        run: go test -v ./...

      - name: Setup Docker buildx
        # v3 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log into registry ${{ env.REGISTRY }}
        # v3 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build the image locally first for scanning
      - name: Build local image
        # v5 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          load: true # This loads the image into the local docker daemon instead of pushing it
          tags: goeland-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Install Trivy CLI explicitly (recommended for controlling the exact version)
      # This replaces fragile patterns like checking out aquasecurity/trivy + running contrib/install.sh
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6 (post-2026-incident safe commit)
        with:
          trivy-version: '0.69.3' # Safe version (see https://github.com/aquasecurity/trivy/discussions/10425). Avoid v0.69.1 and the malicious 0.69.4

      # 3. Run Trivy vulnerability scanner on the built image
      - name: Run Trivy vulnerability scanner
        # pinned to commit SHA to prevent supply chain attacks
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6
        with:
          image-ref: 'goeland-server:test'
          severity: 'MEDIUM,CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          trivy-version: '0.69.3' # Match the CLI version for consistency

      # 4. Upload results to the Security tab
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # 4b. Gate: fail the job on fixable HIGH/CRITICAL so a vulnerable image is
      # never pushed. Runs after the SARIF upload (which reports MEDIUM too) so
      # findings still reach the Security tab even when this gate fails; reuses
      # Trivy's DB cached by the scan above (skip-db-update) so it is fast.
      # pinned to commit SHA to prevent supply chain attacks
      - name: Fail on HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6
        with:
          image-ref: 'goeland-server:test'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          skip-db-update: true
          trivy-version: '0.69.3'

      # 5. Final Push - Only if previous steps (including scan) succeeded
      - name: Extract Docker metadata
        id: meta
        # v5 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        # v5 - pinned to commit SHA to prevent supply chain attacks,
        # see: https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use build cache to speed up subsequent runs
          cache-from: type=gha
          cache-to: type=gha,mode=max